version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/azure-sql-edge
    platform: linux/arm64   # pour Mac M1/M2
    container_name: sqlserver
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourStrong!Passw0rd"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

volumes:
  sqlserver_data: {}